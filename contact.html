<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-title>Contact | </title>
  <meta name="description" content="Contact Northline Barbers for appointments and enquiries." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="" alt="Logo" class="brand-logo" data-logo-src>
        <span class="brand-name" data-shop-name></span>
        <span class="brand-tag" data-shop-tag></span>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="team.html">Meet the Team</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>

      <div class="header-actions">
        <a href="#" class="btn btn-secondary" data-phone-link>Call Now</a>
        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-primary"
          data-booking-link
        >
          Book Now
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Contact</span>
        <h1 class="page-title" data-contact-title></h1>
        <p class="page-subtitle" data-contact-text>
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="info-grid">
          <div class="panel">
            <span class="eyebrow">Get In Touch</span>
            <h3>Contact Details</h3>

            <div class="contact-list">
              <div class="contact-item">
                <strong>Phone</strong>
                <a href="#" data-phone-link-display></a>
              </div>

              <div class="contact-item">
                <strong>Email</strong>
                <a href="#" data-email-link></a>
              </div>

              <div class="contact-item">
                <strong>Address</strong>
                <span data-address></span>
              </div>

              <div class="contact-item">
                <strong>Opening Hours</strong>
                <span data-opening-hours></span>
              </div>
            </div>

            <div class="button-row">
              <a href="#" class="btn btn-secondary" data-phone-link>Call Now</a>
              <a
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                class="btn btn-primary"
                data-booking-link
              >
                Book Now
              </a>
            </div>
          </div>

          <div class="panel">
            <span class="eyebrow">Visit Us</span>
            <h3>Location</h3>

            <div class="map-frame">
              <iframe
                src="#"
                data-map-embed-url
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
                title="Barber shop location map"
              ></iframe>
            </div>

            <p class="body-copy body-copy-small">
              Easy to find, easy to reach, and ideal for both booked appointments and walk-ins.
            </p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p data-copyright></p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="#" data-instagram-link>Instagram</a>
      </div>
    </div>
  </footer>

</body>
</html>
