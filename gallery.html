<!DOCTYPE html>
<!-- Image files to replace: images/gallery-1.jpg through images/gallery-6.jpg -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-title>Gallery | </title>
  <meta name="description" content="Browse the Northline Barbers gallery." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="" alt="Logo" class="brand-logo" data-logo-src>
        <span class="brand-name" data-shop-name></span>
        <span class="brand-tag" data-shop-tag></span>
      </a>

      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="team.html">Meet the Team</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="header-actions">
        <a href="#" class="btn btn-secondary" data-phone-link>Call Now</a>
        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          class="btn btn-primary"
          data-booking-link
        >
          Book Now
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Gallery</span>
        <h1 class="page-title">Recent Cuts & Shop Style</h1>
        <p class="page-subtitle">
          A look at our work, our finish, and the standard we aim for every day.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="gallery-grid">
          <div class="gallery-item tall">
            <img src="images/gallery-1.jpg" alt="Haircut close-up" />
          </div>
          <div class="gallery-item">
            <img src="images/gallery-2.jpg" alt="Barber cutting hair" />
          </div>
          <div class="gallery-item">
            <img src="images/gallery-3.jpg" alt="Barber tools" />
          </div>
          <div class="gallery-item">
            <img src="images/gallery-4.jpg" alt="Barber chair and shop interior" />
          </div>
          <div class="gallery-item wide">
            <img src="images/gallery-5.jpg" alt="Client haircut result" />
          </div>
          <div class="gallery-item">
            <img src="images/gallery-6.jpg" alt="Professional barber shop interior" />
          </div>
        </div>
      </div>
    </section>

    <section class="section section-tight-bottom">
      <div class="container">
        <div class="cta-strip">
          <div>
            <h3>Like what you see?</h3>
            <p>Book in and get your next cut done properly.</p>
          </div>
          <a
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="btn btn-primary"
            data-booking-link
          >
            Book Appointment
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p data-copyright></p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="team.html">Team</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="#" data-instagram-link>Instagram</a>
      </div>
    </div>
  </footer>

</body>
</html>
